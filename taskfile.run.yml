version: '3'

tasks:
  docs:
    desc: "Run documentation generator"
    cmds:
      - go -C ./cmd run . docs --verbosity 2
      # sync generated docs into the docs site (trailing slash = copy contents, not directory)
      - rsync -a _data/docs/sintax/ ../../awee-ai/docs/content/docs/engine/templating/modifiers
      - rsync -a _data/docs/sintax/ ../../awee-ai/skillregistry/docs/templating